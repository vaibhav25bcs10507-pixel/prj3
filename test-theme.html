<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --color-white: #ffffff;
    --color-zinc-800: #27272a;
  }
  [data-theme="cherry"] {
    --color-white: #312D65;
    --color-zinc-800: #ADA6FF;
  }
  .text-white { color: var(--color-white); }
  .bg-zinc-800 { background-color: var(--color-zinc-800); }
</style>
</head>
<body data-theme="cherry">
  <div class="bg-zinc-800 text-white">Hello World</div>
</body>
</html>
